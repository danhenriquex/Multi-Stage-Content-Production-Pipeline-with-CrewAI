repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: no-commit-to-branch
        args: [--branch, main]
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: unit-tests
        name: Unit Tests
        entry: bash -c 'cd "$(git rev-parse --show-toplevel)" && python -m pytest tests/unit/ -q --tb=short'
        language: system
        pass_filenames: false
        stages: [pre-push]
        additional_dependencies: []
